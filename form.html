<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

    <h2>FORMS</h2>

    <form>

        <label>Name</label><br>
        <input type="text" placeholder="Name"><br><br>

        <label>Email-id</label><br>
        <input type="email" placeholder="Email-id"><br><br>

        <label>Password</label><br>
        <input type="password" placeholder="Password"><br><br>

        <label>Language</label><br>
        <input type="checkbox"> HTML <br>
        <input type="checkbox"> CSS <br>
        <input type="checkbox"> JS <br><br>

        <label>Course</label><br>
        <input type="radio" name="course"> Java Stack <br>
        <input type="radio" name="course"> Data Science <br>
        <input type="radio" name="course"> Mern Stack <br><br>

        <label>Field:</label><br>
        <select>
            <option>Select</option>
            <option>Student</option>
            <option>Developer</option>
            <option>Designer</option>
            <option>Tester</option>
        </select>
        <br><br>

        <label>Describe yourself</label><br>
        <textarea rows="5" cols="30"></textarea>
        <br><br>

        <label>Date</label><br>
        <input type="date">
        <br><br>

        <label>Phone No.</label><br>
        <input type="tel" placeholder="Phone NO.">
        <br><br>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>

    </form>

</body>
</html>
